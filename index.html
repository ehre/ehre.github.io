<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ehrencrona.org</title>
<link rel="icon" href="https://ehrencrona.org/favicon.ico">
<link rel="stylesheet" href="./shared.css">
</head>
<body>
<div class="page">
  <header class="brand-header">
    <picture>
      <source srcset="ehrencrona_logo_darkmode.png" media="(prefers-color-scheme: dark)">
      <img class="brand-logo" src="ehrencrona_logo.png" alt="Ehrencrona logo">
    </picture>
  </header>

  <main class="content">
    <div class="content-inner">
      <h1 class="home-title">ehrencrona.org</h1>
      <section aria-label="Apps">
        <div id="apps" class="apps" role="list"></div>
        <div id="note" class="note" aria-live="polite"></div>
      </section>
    </div>
  </main>
</div>

<script>
(() => {
  const appsEl = document.getElementById('apps');
  const noteEl = document.getElementById('note');
  const txt = v => (v ?? '').toString();
  const setNote = m => (noteEl.textContent = m || '');

  const card = (app) => {
    const a = document.createElement('a');
    a.className = 'app-card';
    a.href = txt(app.url);
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.setAttribute('role', 'listitem');

    const title = document.createElement('div');
    title.className = 'app-title';
    title.innerHTML = `<strong></strong><span>→</span>`;
    title.querySelector('strong').textContent = txt(app.name);

    const desc = document.createElement('div');
    desc.className = 'app-desc';
    desc.textContent = txt(app.description);

    a.append(title, desc);
    return a;
  };

  (async () => {
    try {
      setNote('Laddar appar…');

      const res = await fetch('https://ehrencrona.org/apps.json', { cache: 'no-store' });
      if (!res.ok) throw new Error('apps.json fetch failed');

      const data = await res.json();
      const apps = Array.isArray(data.apps) ? data.apps.slice() : [];

      apps.sort((a, b) => {
        const oa = Number.isFinite(+a.order) ? +a.order : 1e9;
        const ob = Number.isFinite(+b.order) ? +b.order : 1e9;
        return oa - ob || txt(a.name).localeCompare(txt(b.name), 'sv');
      });

      appsEl.innerHTML = '';
      if (!apps.length) return setNote('Inga appar att visa ännu.');

      const frag = document.createDocumentFragment();
      apps.forEach(app => frag.appendChild(card(app)));
      appsEl.appendChild(frag);
      setNote('');
    } catch (e) {
      console.error(e);
      setNote('Kunde inte ladda applistan.');
    }
  })();
})();
</script>
</body>
</html>
